<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - StudentBuddy</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    min-height: 100vh;
    background: linear-gradient(135deg, #6d28d9 0%, #4f46e5 50%, #7c3aed 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    padding: 20px;
}

.auth-card {
    background: white;
    border-radius: 24px;
    padding: 40px 36px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}

.auth-logo {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, #6d28d9, #4f46e5);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin: 0 auto 16px;
}

.auth-title {
    font-size: 26px;
    font-weight: 900;
    color: #1a1a2e;
    text-align: center;
    margin-bottom: 6px;
}

.auth-subtitle {
    font-size: 14px;
    color: #9491b4;
    text-align: center;
    margin-bottom: 28px;
}

.form-group {
    margin-bottom: 16px;
}

.form-label {
    display: block;
    font-size: 13px;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 6px;
}

.form-input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #eee8ff;
    border-radius: 12px;
    font-size: 14px;
    font-family: Nunito;
    color: #1a1a2e;
    outline: none;
    transition: border-color 0.2s;
    background: white;
}

.form-input:focus {
    border-color: #6d28d9;
}

.form-input::placeholder {
    color: #c4b5fd;
}

.auth-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #6d28d9, #4f46e5);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 800;
    font-family: Nunito;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s ease;
}

.auth-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(109,40,217,0.4);
}

.auth-link {
    text-align: center;
    margin-top: 20px;
    font-size: 13px;
    color: #9491b4;
}

.auth-link a {
    color: #6d28d9;
    font-weight: 700;
    text-decoration: none;
}

.error-box {
    background: #fff1f2;
    border: 1px solid #fecdd3;
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 16px;
    font-size: 13px;
    color: #be123c;
    font-weight: 600;
}

/* Mobile responsive */
@media (max-width: 480px) {
    body { padding: 16px; align-items: flex-start; padding-top: 40px; }
    .auth-card { padding: 28px 20px; }
    .auth-title { font-size: 22px; }
}
</style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-logo">🎓</div>
        <h1 class="auth-title">Join StudentBuddy</h1>
        <p class="auth-subtitle">Step into future of learning</p>

        {% if error %}
        <div class="error-box">⚠️ {{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Username *</label>
                <input type="text" name="username" class="form-input" 
                       placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label class="form-label">Email *</label>
                <input type="email" name="email" class="form-input" 
                       placeholder="your.email@example.com" required>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                <div class="form-group">
                    <label class="form-label">First Name *</label>
                    <input type="text" name="first_name" class="form-input" 
                           placeholder="John" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Last Name *</label>
                    <input type="text" name="last_name" class="form-input" 
                           placeholder="Doe" required>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Password *</label>
                <input type="password" name="password" class="form-input" 
                       placeholder="Create a strong password" required>
            </div>
            <div class="form-group">
                <label class="form-label">University</label>
                <input type="text" name="university" class="form-input" 
                       placeholder="e.g. SPPU, Mumbai University">
            </div>
            <div class="form-group">
                <label class="form-label">Semester</label>
                <select name="semester" class="form-input">
                    <option value="">Select Semester</option>
                    <option>Semester 1</option>
                    <option>Semester 2</option>
                    <option>Semester 3</option>
                    <option>Semester 4</option>
                    <option>Semester 5</option>
                    <option>Semester 6</option>
                    <option>Semester 7</option>
                    <option>Semester 8</option>
                </select>
            </div>
            <button type="submit" class="auth-btn">➕ Create Account</button>
        </form>

        <div class="auth-link">
            Already have an account? 
            <a href="/login/">Login here</a>
        </div>
    </div>
</body>
</html>
