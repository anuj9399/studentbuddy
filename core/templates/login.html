
<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #f8f7ff;
            --white: #ffffff;
            --primary: #6d28d9;
            --primary-light: #7c3aed;
            --primary-soft: #ede9fe;
            --primary-border: #ddd6fe;
            --text-dark: #1a1a2e;
            --text-muted: #9491b4;
            --border: #eee8ff;
            --gradient: linear-gradient(135deg, #6d28d9, #4f46e5 60%, #0ea5e9);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            font-family: 'Nunito', sans-serif; 
            background: var(--gradient);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        .card {
            background: var(--white);
            border-radius: 24px;
            box-shadow: 0 24px 64px rgba(109,40,217,0.25);
        }
        
        .input {
            border: 1px solid var(--border);
            border-radius: 10px;
            background: white;
            font-family: 'Nunito', sans-serif;
            transition: all 0.2s ease;
        }
        
        .input:focus {
            border-color: #a78bfa;
            outline: none;
            box-shadow: 0 0 0 3px rgba(167,139,250,0.15);
        }
        
        .btn {
            border-radius: 12px;
            font-weight: 700;
            font-family: 'Nunito', sans-serif;
            transition: all 0.2s ease;
        }
        
        .btn-primary {
            background: var(--gradient);
            color: white;
            border: none;
        }
        
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(109,40,217,0.25);
        }
        
        .alert-error {
            background: #fff1f2;
            border-left: 4px solid #be123c;
            color: #9f1239;
            border-radius: 12px;
            padding: 14px 18px;
            font-weight: 600;
            margin-bottom: 16px;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center font-sans relative overflow-hidden">

    <div class="card p-10 w-full max-w-md relative z-10 mx-4">
        
        <div class="text-center mb-8">
            <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-purple-600 to-blue-500 flex items-center justify-center mx-auto mb-4">
                <span class="text-white text-2xl">🎓</span>
            </div>
            <h2 class="text-4xl font-black text-[var(--text-dark)] tracking-tight mb-2">StudentBuddy</h2>
            <p class="text-[14px] text-[var(--text-muted)]">Your AI Academic Companion</p>
        </div>

        {% if messages %}
        <div class="mb-6 space-y-2">
            {% for message in messages %}
            <div class="alert-error flex items-center gap-3">
                <i class="fa-solid fa-circle-exclamation"></i>
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="post" class="space-y-6">
            {% csrf_token %}

            <div class="space-y-4">
                <label class="block text-[13px] font-black text-[var(--text-dark)] mb-2">Username</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-[var(--text-muted)]">
                        <i class="fa-solid fa-user"></i>
                    </span>
                    <input type="text" name="username" placeholder="Enter username"
                        class="input w-full pl-11 pr-4 py-3 text-[14px]">
                </div>
            </div>

            <div class="space-y-4">
                <label class="block text-[13px] font-black text-[var(--text-dark)] mb-2">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-[var(--text-muted)]">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" name="password" placeholder="•••••"
                        class="input w-full pl-11 pr-4 py-3 text-[14px]">
                </div>
            </div>

            <button class="btn btn-primary w-full py-4 font-black text-[16px]">
                Login
            </button>
        </form>

        <p class="text-[14px] text-[var(--text-muted)] mt-8 text-center">
            Don't have an account? <a href="/signup/" class="text-[var(--primary)] font-black hover:underline">Create account</a>
        </p>
    </div>
</body>
</html>
