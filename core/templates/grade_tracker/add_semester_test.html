{% extends "base.html" %}
{% block content %}

<div class="max-w-4xl mx-auto">

    <!-- Header -->
    <div class="mb-8">
        <a href="{% url 'grade_tracker:grade_dashboard' %}" class="text-purple-400 hover:text-purple-300 mb-4 inline-block">
            <i class="fa-solid fa-arrow-left mr-2"></i>Back to Grade Tracker
        </a>
        <h1 class="text-4xl font-bold text-white mb-2">Add Semester (Test)</h1>
        <p class="text-slate-400">Simple test form</p>
    </div>

    <!-- Simple Test Form -->
    <form method="post" class="glass-panel rounded-2xl p-8 border border-slate-700/50">
        {% csrf_token %}
        
        <div class="space-y-6">
            <div>
                <label class="block text-lg font-semibold text-white mb-3">Semester Number</label>
                <input type="number" name="semester_number" value="1" class="w-full p-4 rounded-xl bg-slate-800/50 text-white border border-slate-700 focus:border-purple-500 focus:outline-none text-lg" required>
            </div>
            
            <div>
                <label class="block text-lg font-semibold text-white mb-3">Semester Name</label>
                <input type="text" name="semester_name" value="Test Semester" class="w-full p-4 rounded-xl bg-slate-800/50 text-white border border-slate-700 focus:border-purple-500 focus:outline-none text-lg" required>
            </div>
            
            <div>
                <label class="block text-lg font-semibold text-white mb-3">SGPA (Simple Mode)</label>
                <input type="number" name="sgpa" step="0.01" value="8.5" class="w-full p-4 rounded-xl bg-slate-800/50 text-white border border-slate-700 focus:border-purple-500 focus:outline-none text-lg" required>
            </div>
            
            <div>
                <label class="block text-lg font-semibold text-white mb-3">Total Credits</label>
                <input type="number" name="total_credits" value="18" class="w-full p-4 rounded-xl bg-slate-800/50 text-white border border-slate-700 focus:border-purple-500 focus:outline-none text-lg" required>
            </div>
            
            <button type="submit" class="w-full px-8 py-4 bg-gradient-to-r from-purple-600 to-indigo-600 text-white rounded-xl hover:from-purple-700 hover:to-indigo-700 transition-all transform hover:scale-105 shadow-lg font-semibold text-lg">
                <i class="fa-solid fa-save mr-2"></i>
                Save Semester
            </button>
        </div>
    </form>

</div>
{% endblock %}
